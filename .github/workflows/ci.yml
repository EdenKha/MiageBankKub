name: CI Pipeline MIAGE-Bank

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # On utilise un JDK pour générer le JAR du service (pré-requis pour construire l'image)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (Banque-ClientService)
      run: mvn -B package --file BanqueMSSol/pom.xml -pl Banque-ClientService -am
      
    - name: Run Hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: BanqueMSSol/Banque-ClientService/Containerfile

    - name: Build image with Buildah
      id: build-image
      uses: redhat-actions/buildah-build@v2
      with:
        image: miage-bank
        tags: latest
        containerfiles: BanqueMSSol/Banque-ClientService/Containerfile
        context: BanqueMSSol/Banque-ClientService

    - name: Push image to Docker Daemon for Trivy and Dive
      run: buildah push miage-bank:latest docker-daemon:miage-bank:latest

    - name: Push to GitHub Container Registry
      uses: redhat-actions/push-to-registry@v2
      with:
        image: miage-bank
        tags: latest
        registry: ghcr.io/edenkha
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Trivy vulnerability scanner (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'miage-bank:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        # On ne bloque pas forcément le build
        # exit-code: 1

    - name: Run Trivy vulnerability scanner (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'miage-bank:latest'
        format: 'json'
        output: 'trivy-results.json'
        severity: 'CRITICAL,HIGH'

    - name: Run Dive audit
      run: |
        wget -q https://github.com/wagoodman/dive/releases/download/v0.12.0/dive_0.12.0_linux_amd64.deb
        sudo dpkg -i dive_0.12.0_linux_amd64.deb
        dive miage-bank:latest --ci --ci-config ${{ github.workspace }}/.dive-ci.yml -j dive-report.json
        
    - name: Export Build Reports
      if: always()
      run: |
        mkdir -p build-reports
        cp trivy-results.sarif build-reports/ || true
        cp trivy-results.json build-reports/ || true
        cp dive-report.json build-reports/ || true
      
    - name: Upload Build Reports Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: build-reports/

    - name: Fix ownership for git cleanup
      if: always()
      run: sudo chown -R runner:docker ${{ github.workspace }}
