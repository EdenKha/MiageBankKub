# Default values for miage-bank.

replicaCount: 3

image:
  repository: ghcr.io/edenkha/miage-bank
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "miage-bank-sa"

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 10011

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: miage-bank.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Configuration de la base de données
db:
  host: "bnkmysql.default.svc.cluster.local"
  port: 3306
  name: "banquebd"
  # Le nom du secret K8s créé séparément (externe au chart)
  secretName: "miage-bank-db-secret"
