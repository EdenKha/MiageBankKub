# Production values for miage-bank.
# Usage : helm install miage-bank-release ./miage-bank -f miage-bank/values-prod.yaml -n miage-bank

replicaCount: 3

# Images de production depuis GitHub Container Registry
services:
  clientService:
    image:
      repository: ghcr.io/edenkha/banque-clientservice
      pullPolicy: Always
      tag: "latest"
    service:
      port: 8081

  configServer:
    image:
      repository: ghcr.io/edenkha/banque-configsrv
      pullPolicy: Always
      tag: "latest"
    service:
      port: 10003

  annuaire:
    image:
      repository: ghcr.io/edenkha/banque-annuaire
      pullPolicy: Always
      tag: "latest"
    service:
      port: 10001

  compteService:
    image:
      repository: ghcr.io/edenkha/banque-compteservice
      pullPolicy: Always
      tag: "latest"
    service:
      port: 10021

  compositeService:
    image:
      repository: ghcr.io/edenkha/banque-compositeservice
      pullPolicy: Always
      tag: "latest"
    service:
      port: 10031

  apiGateway:
    image:
      repository: ghcr.io/edenkha/banque-apigateway
      pullPolicy: Always
      tag: "latest"
    service:
      port: 10000

  mysql:
    image:
      repository: mysql
      pullPolicy: IfNotPresent
      tag: "oracle"
    service:
      port: 3306

  mongo:
    image:
      repository: mongo
      pullPolicy: IfNotPresent
      tag: "latest"
    service:
      port: 27017

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: "miage-bank-sa"

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 10011

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: miage-bank.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Configuration de la base de données MySQL
db:
  host: "bnkmysql"
  port: 3306
  name: "banquebd"
  secretName: "miage-bank-db-secret"

# Configuration MongoDB
mongo:
  host: "bnkmongo"
  port: 27017
  database: "banquebd"
  secretName: "miage-bank-mongo-secret"

# Configuration Hashicorp Vault (pour External Secrets Operator)
vault:
  server: "http://vault.default.svc.cluster.local:8200"
  kvPath: "secret"
  version: "v2"
  secretPath: "miage-bank/db"
  mongoSecretPath: "miage-bank/mongo"
  tokenSecretName: "vault-token"
