# Surcharge des valeurs pour l'environnement de Production

replicaCount: 3

image:
  tag: "1.0.0"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  hosts:
    - host: api.miage-bank.com
      paths:
        - path: /
          pathType: ImplementationSpecific
