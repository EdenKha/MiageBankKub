# Default values for miage-bank.

replicaCount: 1

services:
  clientService:
    image:
      repository: banque-clientservice
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10011


  configServer:
    image:
      repository: banque-configsrv
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10003

  annuaire:
    image:
      repository: banque-annuaire
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10001

  compteService:
    image:
      repository: banque-compteservice
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10021

  compositeService:
    image:
      repository: banque-compositeservice
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10031

  apiGateway:
    image:
      repository: banque-apigateway
      pullPolicy: IfNotPresent
      tag: "7.0"
    service:
      port: 10000

  mysql:
    image:
      repository: mysql
      pullPolicy: IfNotPresent
      tag: "oracle"
    service:
      port: 3306

  mongo:
    image:
      repository: mongo
      pullPolicy: IfNotPresent
      tag: "latest"
    service:
      port: 27017

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "miage-bank-sa"

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 10011

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: miage-bank.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Configuration de la base de données MySQL
db:
  host: "bnkmysql"
  port: 3306
  name: "banquebd"
  # Le nom du secret K8s créé par l'ExternalSecret (via Vault/ESO)
  secretName: "miage-bank-db-secret"

# Configuration MongoDB
mongo:
  host: "bnkmongo"
  port: 27017
  database: "banquebd"
  # Le nom du secret K8s créé par l'ExternalSecret (via Vault/ESO)
  secretName: "miage-bank-mongo-secret"

# Configuration Hashicorp Vault (pour External Secrets Operator)
vault:
  server: "http://vault.default.svc.cluster.local:8200"
  kvPath: "secret"
  version: "v2"
  secretPath: "miage-bank/db"
  # Chemin Vault pour les credentials MongoDB
  mongoSecretPath: "miage-bank/mongo"
  # Nom du secret Kubernetes qui contient le token d'accès à Vault
  tokenSecretName: "vault-token"
