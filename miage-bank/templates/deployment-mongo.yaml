apiVersion: apps/v1
kind: Deployment
metadata:
  name: bnkmongo
  labels:
    app: bnkmongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bnkmongo
  template:
    metadata:
      labels:
        app: bnkmongo
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.services.mongo.image.repository }}:{{ .Values.services.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.services.mongo.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.mongo.service.port }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "root"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "root"
            - name: MONGO_INITDB_DATABASE
              value: "banquebd"
