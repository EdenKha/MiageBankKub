apiVersion: apps/v1
kind: Deployment
metadata:
  name: bnkcompteservice
  labels:
    app: bnkcompteservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bnkcompteservice
  template:
    metadata:
      labels:
        app: bnkcompteservice
    spec:
      serviceAccountName: {{ include "miage-bank.serviceAccountName" . }}
      containers:
        - name: compteservice
          image: "{{ .Values.services.compteService.image.repository }}:{{ .Values.services.compteService.image.tag }}"
          imagePullPolicy: {{ .Values.services.compteService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.compteService.service.port }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.services.compteService.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.services.compteService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "10021"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://bnkannuaire:10001/eureka/"
            # Individual MongoDB properties (no URI) - avoids Spring Boot 2.6 conflict
            # comptesservice-dev.yml on Bitbucket also uses host+username+password format
            - name: SPRING_DATA_MONGODB_HOST
              value: "bnkmongo"
            - name: SPRING_DATA_MONGODB_PORT
              value: "27017"
            - name: SPRING_DATA_MONGODB_DATABASE
              value: "banquebd"
            - name: SPRING_DATA_MONGODB_USERNAME
              value: "root"
            - name: SPRING_DATA_MONGODB_PASSWORD
              value: "root"
            - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
              value: "admin"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: WAIT_HOSTS
              value: "bnkconfigsrv:{{ .Values.services.configServer.service.port }}, bnkmongo:{{ .Values.services.mongo.service.port }}"
