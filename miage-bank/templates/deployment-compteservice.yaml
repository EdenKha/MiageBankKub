apiVersion: apps/v1
kind: Deployment
metadata:
  name: bnkcompteservice
  labels:
    app: bnkcompteservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bnkcompteservice
  template:
    metadata:
      labels:
        app: bnkcompteservice
    spec:
      serviceAccountName: {{ include "miage-bank.serviceAccountName" . }}
      containers:
        - name: compteservice
          image: "{{ .Values.services.compteService.image.repository }}:{{ .Values.services.compteService.image.tag }}"
          imagePullPolicy: {{ .Values.services.compteService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.compteService.service.port }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.services.compteService.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.services.compteService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "10021"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://bnkannuaire:10001/eureka/"
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://root:root@bnkmongo:27017/banquebd?authSource=admin"
            # Force Spring Boot to NOT let ConfigServer override system/env vars
            # Needed because comptesservice-dev.yml on Bitbucket sets mongodb.uri
            # without auth, which conflicts with the env var when both are present
            - name: SPRING_CLOUD_CONFIG_OVERRIDE_SYSTEM_PROPERTIES
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: WAIT_HOSTS
              value: "bnkconfigsrv:{{ .Values.services.configServer.service.port }}, bnkmongo:{{ .Values.services.mongo.service.port }}"
