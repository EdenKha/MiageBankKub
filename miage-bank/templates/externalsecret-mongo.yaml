apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "miage-bank.fullname" . }}-mongo-secret
  labels:
    {{- include "miage-bank.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ include "miage-bank.fullname" . }}-vault
    kind: SecretStore
  target:
    name: {{ .Values.mongo.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.vault.mongoSecretPath }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.vault.mongoSecretPath }}
        property: password
    - secretKey: uri
      remoteRef:
        key: {{ .Values.vault.mongoSecretPath }}
        property: uri
